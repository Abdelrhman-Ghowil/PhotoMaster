name: Deploy PhotoMaster Streamlit App

on:
  push:
    branches:
      - main
      - ninja-updates
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: "Branch to deploy (defaults to the branch that triggered this run)"
        required: false
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Resolve deploy branch
      run: |
        if [ -n "${{ github.event.inputs.deploy_branch }}" ]; then
          echo "DEPLOY_BRANCH=${{ github.event.inputs.deploy_branch }}" >> "$GITHUB_ENV"
        else
          echo "DEPLOY_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
        fi

    - name: Install sshpass
      run: |
        sudo apt-get update
        sudo apt-get install -y sshpass

    - name: Deploy to server
      env:
        SERVER_IP: 128.140.37.194
        SSH_USER: shobbak
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      run: |
        sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no "$SSH_USER@$SERVER_IP" "
        cd /home/shobbak/superpower/App_v1 &&
        git fetch origin &&
        git checkout \"$DEPLOY_BRANCH\" &&
        git pull origin \"$DEPLOY_BRANCH\" &&
        source venv/bin/activate &&
        echo \"$SSH_PASSWORD\" | sudo -S systemctl restart PhMr.service"
